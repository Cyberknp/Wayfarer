<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WayFarer Map Interface</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            base: "#0b1121",
                            surface: "#111827",
                            accent: "#22d3ee",
                            accentStrong: "#38bdf8",
                            danger: "#ef4444",
                            caution: "#f59e0b",
                            safe: "#10b981",
                        },
                        fontFamily: { sans: ["Inter", "sans-serif"] },
                    },
                },
            };
        </script>
        <style>
            body {
                background-color: #0b1121;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background-image:
                    radial-gradient(
                        circle at 20% 20%,
                        rgba(34, 211, 238, 0.12) 0%,
                        transparent 55%
                    ),
                    radial-gradient(
                        circle at 80% 30%,
                        rgba(59, 130, 246, 0.12) 0%,
                        transparent 55%
                    );
            }
            .map-bg {
                background-image:
                    linear-gradient(
                        rgba(255, 255, 255, 0.05) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        rgba(255, 255, 255, 0.05) 1px,
                        transparent 1px
                    );
                background-size: 40px 40px;
            }
            .marker::after {
                content: "";
                position: absolute;
                inset: -8px;
                border-radius: 50%;
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0% {
                    transform: scale(1);
                    opacity: 0.8;
                }
                100% {
                    transform: scale(3);
                    opacity: 0;
                }
            }
        </style>
    </head>
    <body>
        <div
            class="w-[375px] h-[812px] bg-base relative overflow-hidden border-8 border-slate-900 rounded-[40px] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.8)]"
        >
            <!-- Top Navigation -->
            <header
                class="absolute top-0 left-0 right-0 h-[100px] pt-[50px] px-5 bg-gradient-to-b from-base to-transparent flex justify-between items-center z-20"
            >
                <div class="flex items-center gap-3">
                    <a
                        href="index.html"
                        class="text-white hover:text-sky-400 transition-colors flex items-center p-2"
                        ><i
                            data-lucide="arrow-left"
                            class="w-6 h-6 drop-shadow-md"
                        ></i
                    ></a>
                    <div
                        class="text-white font-extrabold text-xl tracking-tight drop-shadow-md"
                    >
                        Way<span class="text-sky-400">Farer</span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <i
                        data-lucide="bell"
                        class="w-6 h-6 text-white cursor-pointer hover:text-sky-400 transition-colors drop-shadow-md"
                    ></i>
                    <div
                        class="w-9 h-9 rounded-full bg-gradient-to-br from-sky-400 via-blue-500 to-indigo-600 border-2 border-white/20 shadow-md cursor-pointer"
                    ></div>
                </div>
            </header>

            <!-- Search Bar Overlay -->
            <div class="absolute top-[110px] left-5 right-5 z-20">
                <div
                    class="w-full bg-slate-800/90 backdrop-blur-md border border-sky-500/30 rounded-2xl p-3.5 flex items-center gap-3 shadow-[0_10px_30px_rgba(0,0,0,0.5)]"
                >
                    <i data-lucide="search" class="w-5 h-5 text-sky-400"></i>
                    <input
                        type="text"
                        placeholder="Search destination..."
                        class="bg-transparent border-none text-white outline-none text-[15px] w-full placeholder-slate-400 font-semibold tracking-wide"
                    />
                </div>
            </div>

            <!-- Legend Overlay -->
            <div class="absolute left-5 top-[185px] flex flex-col gap-2.5 z-10">
                <div
                    class="bg-slate-900/80 backdrop-blur-md py-2 px-3.5 rounded-full text-[11px] font-black uppercase tracking-wider flex items-center gap-2.5 border border-white/10 text-white shadow-lg"
                >
                    <div
                        class="w-2.5 h-2.5 rounded-full bg-danger shadow-[0_0_10px_#ef4444]"
                    ></div>
                    Danger
                </div>
                <div
                    class="bg-slate-900/80 backdrop-blur-md py-2 px-3.5 rounded-full text-[11px] font-black uppercase tracking-wider flex items-center gap-2.5 border border-white/10 text-white shadow-lg"
                >
                    <div
                        class="w-2.5 h-2.5 rounded-full bg-caution shadow-[0_0_10px_#f59e0b]"
                    ></div>
                    Caution
                </div>
                <div
                    class="bg-slate-900/80 backdrop-blur-md py-2 px-3.5 rounded-full text-[11px] font-black uppercase tracking-wider flex items-center gap-2.5 border border-white/10 text-white shadow-lg"
                >
                    <div
                        class="w-2.5 h-2.5 rounded-full bg-safe shadow-[0_0_10px_#10b981]"
                    ></div>
                    Safe
                </div>
            </div>

            <!-- Map Area -->
            <div class="absolute inset-0 bg-[#0c162d] map-bg">
                <!-- Road placeholders -->
                <div
                    class="absolute bg-slate-800/80 w-full h-[45px] top-[338px] border-y border-white/5"
                ></div>
                <div
                    class="absolute bg-slate-800/80 w-[45px] h-full left-[168px] border-x border-white/5"
                ></div>

                <!-- Map Markers -->
                <div
                    class="marker absolute w-5 h-5 rounded-full bg-danger shadow-[0_0_20px_#ef4444] top-[350px] left-[180px] z-10 before:content-[''] before:absolute before:inset-[-8px] before:rounded-full before:bg-danger before:animate-[pulse_2s_infinite]"
                ></div>
                <div
                    class="marker absolute w-5 h-5 rounded-full bg-caution shadow-[0_0_20px_#f59e0b] top-[280px] left-[80px] z-10 before:content-[''] before:absolute before:inset-[-8px] before:rounded-full before:bg-caution before:animate-[pulse_2s_infinite]"
                ></div>
                <div
                    class="marker absolute w-5 h-5 rounded-full bg-safe shadow-[0_0_20px_#10b981] top-[480px] left-[250px] z-10 before:content-[''] before:absolute before:inset-[-8px] before:rounded-full before:bg-safe before:animate-[pulse_2s_infinite]"
                ></div>
            </div>

            <!-- SOS Button -->
            <div
                class="absolute bottom-[230px] right-5 w-[80px] h-[80px] bg-gradient-to-br from-red-500 to-rose-600 rounded-full flex flex-col justify-center items-center shadow-[0_0_40px_rgba(239,68,68,0.7)] border-[4px] border-white/30 z-30 cursor-pointer active:scale-95 transition-transform"
            >
                <span
                    class="font-black text-white text-2xl leading-none tracking-tighter drop-shadow-md"
                    >SOS</span
                >
            </div>

            <!-- Bottom Sheet Card -->
            <div
                class="absolute bottom-0 left-0 right-0 bg-slate-800/95 backdrop-blur-3xl rounded-t-[32px] pt-7 px-6 pb-10 z-[25] border-t-[3px] border-sky-500 shadow-[0_-15px_50px_rgba(0,0,0,0.6)]"
            >
                <div
                    class="w-14 h-1.5 bg-white/20 rounded-full mx-auto -mt-4 mb-7"
                ></div>
                <div>
                    <h3
                        class="text-white text-2xl font-black mb-1.5 tracking-tight"
                    >
                        Industrial District
                    </h3>
                    <div
                        class="flex gap-5 mb-7 text-slate-300 text-[15px] font-bold"
                    >
                        <div class="flex items-center gap-2">
                            <i
                                data-lucide="navigation"
                                class="w-5 h-5 text-sky-400"
                            ></i>
                            240m away
                        </div>
                        <div
                            class="flex items-center gap-2 text-danger bg-danger/10 px-3 py-1 rounded-lg border border-danger/30"
                        >
                            <i data-lucide="alert-triangle" class="w-4 h-4"></i>
                            12 Reports
                        </div>
                    </div>
                    <button
                        class="w-full bg-gradient-to-r from-sky-400 to-blue-600 hover:from-sky-300 hover:to-blue-500 text-white px-4 py-4.5 rounded-2xl font-black uppercase tracking-widest text-[15px] transition-colors shadow-[0_0_25px_rgba(14,165,233,0.5)] border border-sky-300/30 h-[56px] flex items-center justify-center"
                    >
                        View Zone Details
                    </button>
                </div>
            </div>
        </div>

        <script>
            lucide.createIcons();
        </script>
    </body>
</html>
