<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WayFarer | Danger Map Live</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: Inter, sans-serif; background:#0b1121; color:#e2e8f0; }
    #dangerMap { height:100vh; width:100%; }
  </style>
</head>
<body>
  <div class="absolute top-6 left-6 z-[999] bg-slate-900/90 border border-sky-500/30 rounded-2xl p-5 w-[340px] shadow-2xl">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-xl font-black text-white">Danger Map</h1>
      <a href="index_merged_v2.html" class="text-sky-300 text-sm">Back</a>
    </div>
    <div class="space-y-3 text-sm">
      <div class="p-3 rounded-xl bg-red-500/15 border border-red-500/30"><div class="font-bold text-white">High Risk</div><div class="text-slate-300">Low lighting or blind spot zone</div></div>
      <div class="p-3 rounded-xl bg-amber-500/15 border border-amber-500/30"><div class="font-bold text-white">Medium Risk</div><div class="text-slate-300">Late-evening isolated walkway</div></div>
      <div class="p-3 rounded-xl bg-emerald-500/15 border border-emerald-500/30"><div class="font-bold text-white">Safe Zone</div><div class="text-slate-300">Security-backed corridor</div></div>
      <div class="p-3 rounded-xl bg-sky-500/15 border border-sky-500/30"><div class="font-bold text-white">Live Location</div><div id="locationStatus" class="text-slate-300">Waiting for browser location...</div></div>
    </div>
  </div>
  <div id="dangerMap"></div>
  <script>
    const CAMPUS_CENTER = [13.25472, 74.78558];
    const map = L.map('dangerMap').setView(CAMPUS_CENTER, 18);
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);
    const zones = [
      { name: "Low Lighting Corridor", lat: 13.25418, lng: 74.78516, color: "red", radius: 28, desc: "Low lighting after 8 PM" },
      { name: "Isolated Walkway", lat: 13.25526, lng: 74.78602, color: "orange", radius: 24, desc: "Sparse footfall in late evening" },
      { name: "Security Corridor", lat: 13.25463, lng: 74.78578, color: "green", radius: 20, desc: "Patrol-heavy and well lit" }
    ];
    zones.forEach(z => {
      L.circle([z.lat, z.lng], { radius: z.radius, color: z.color, fillColor: z.color, fillOpacity: 0.35 })
        .addTo(map).bindPopup(`<b>${z.name}</b><br>${z.desc}`);
    });
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude, lng = position.coords.longitude;
          L.marker([lat, lng]).addTo(map).bindPopup("You are here").openPopup();
          map.setView([lat, lng], 16);
          document.getElementById("locationStatus").textContent = `Live location found: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        },
        () => { document.getElementById("locationStatus").textContent = "Location denied. Showing campus prototype view."; },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    } else {
      document.getElementById("locationStatus").textContent = "Geolocation not supported.";
    }
  </script>
</body>
</html>
