<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WayFarer | Sign In</title>
        <!-- Fonts -->
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap"
            rel="stylesheet"
        />
        <script
            crossorigin
            src="https://unpkg.com/react@18/umd/react.production.min.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
        ></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            base: "#0b1121",
                            surface: "#111827",
                            accent: "#22d3ee",
                            accentStrong: "#38bdf8",
                            border: "rgba(56,189,248,0.25)",
                        },
                        fontFamily: { sans: ["Inter", "sans-serif"] },
                        animation: {
                            "form-enter":
                                "formEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards",
                        },
                        keyframes: {
                            formEnter: {
                                "0%": {
                                    opacity: "0",
                                    transform: "scale(0.95) translateY(20px)",
                                },
                                "100%": {
                                    opacity: "1",
                                    transform: "scale(1) translateY(0)",
                                },
                            },
                        },
                    },
                },
            };
        </script>
    
<style>
button {
  transition: all 0.25s ease;
}
button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px rgba(56,189,248,0.6),
              0 0 20px rgba(59,130,246,0.5),
              0 0 30px rgba(99,102,241,0.4);
}
</style>

</head>
    <body
        class="min-h-screen flex items-center justify-center bg-[#0b1121] text-slate-100 overflow-hidden relative"
    >
        <!-- Colorful Abstract Background -->
        <div
            class="absolute inset-0 bg-[radial-gradient(circle_at_50%_-20%,rgba(34,211,238,0.18)_0%,transparent_60%)] pointer-events-none"
        ></div>
        <div
            class="absolute inset-0 bg-[radial-gradient(circle_at_10%_80%,rgba(59,130,246,0.14)_0%,transparent_50%)] pointer-events-none"
        ></div>

        <div id="root" class="w-full max-w-[440px] px-4 z-10"></div>

        <script type="text/babel">
            const { useState } = React;

            const InputField = ({ id, type, label }) => (
                <div className="relative mb-6">
                    <input
                        type={type}
                        id={id}
                        className="peer w-full bg-slate-900/60 border border-slate-700/80 px-4 pt-6 pb-2 rounded-xl text-white placeholder-transparent focus:outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-400/50 focus:bg-slate-900/90 transition-all duration-300 shadow-inner"
                        placeholder=" "
                        required
                    />
                    <label
                        htmlFor={id}
                        className="absolute left-4 top-4 text-slate-400 text-sm transition-all duration-300 peer-placeholder-shown:top-4 peer-placeholder-shown:text-base peer-focus:top-1.5 peer-focus:text-xs peer-focus:text-sky-400 flex items-center bg-transparent pointer-events-none font-medium"
                        style={{ transform: "translateY(-2px)" }}
                    >
                        {label}
                    </label>
                </div>
            );

            const App = () => {
                const [mode, setMode] = useState("signin");

                const handleSubmit = (e) => {
                    e.preventDefault();
                    const btn = e.target.querySelector('button[type="submit"]');
                    btn.innerText = "Authenticating...";
                    btn.classList.add("opacity-80", "cursor-wait");
                    setTimeout(
                        () => (window.location.href = "index.html"),
                        800,
                    );
                };

                return (
                    <div className="bg-slate-800/60 backdrop-blur-2xl border border-sky-400/20 rounded-3xl p-8 sm:p-10 shadow-[0_20px_60px_-10px_rgba(0,0,0,0.8),0_0_30px_rgba(14,165,233,0.1)] relative overflow-hidden animate-form-enter">
                        {/* Top Accent Bar */}
                        <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-sky-400 via-blue-500 to-indigo-500"></div>

                        <div className="text-center text-4xl font-black mb-8 text-white drop-shadow-md flex items-center justify-center gap-3">
                            <img src="logo.png" alt="Logo" className="w-10 h-10" />
                            <span>Way<span className="text-transparent bg-clip-text bg-gradient-to-br from-sky-400 to-blue-500">Farer</span></span>
                        </div>

                        <div className="flex bg-slate-950/60 rounded-xl p-1.5 mb-8 border border-slate-700/50 shadow-inner">
                            <button
                                className={`flex-1 py-3 px-4 rounded-lg font-bold transition-all duration-300 ${mode === "signin" ? "bg-gradient-to-r from-sky-500/20 to-blue-500/20 text-sky-300 shadow-md border border-sky-400/30" : "text-slate-400 hover:text-white"}`}
                                onClick={(e) => {
                                    e.preventDefault();
                                    setMode("signin");
                                }}
                            >
                                Sign In
                            </button>
                            <button
                                className={`flex-1 py-3 px-4 rounded-lg font-bold transition-all duration-300 ${mode === "signup" ? "bg-gradient-to-r from-sky-500/20 to-blue-500/20 text-sky-300 shadow-md border border-sky-400/30" : "text-slate-400 hover:text-white"}`}
                                onClick={(e) => {
                                    e.preventDefault();
                                    setMode("signup");
                                }}
                            >
                                Create Account
                            </button>
                        </div>

                        <form onSubmit={handleSubmit}>
                            {mode === "signup" && (
                                <InputField
                                    id="name"
                                    type="text"
                                    label="Full Name"
                                />
                            )}
                            <InputField
                                id="email"
                                type="email"
                                label="Email Address"
                            />
                            <InputField
                                id="password"
                                type="password"
                                label="Password"
                            />

                            <button
                                type="submit"
                                className="w-full mt-6 bg-gradient-to-r from-sky-400 to-blue-600 text-white py-4 rounded-xl font-black text-lg hover:scale-[1.02] transition-all duration-300 shadow-[0_10px_30px_rgba(14,165,233,0.4)] border border-sky-300/30"
                            >
                                {mode === "signin"
                                    ? "Enter Dashboard"
                                    : "Join the Community"}
                            </button>
                        </form>

                        <div className="mt-8 text-center">
                            <a
                                href="welcome.html"
                                className="text-sm text-slate-400 font-semibold hover:text-sky-300 transition-colors flex items-center justify-center gap-2"
                            >
                                <svg
                                    width="18"
                                    height="18"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    strokeWidth="2.5"
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                >
                                    <path d="M19 12H5M12 19l-7-7 7-7" />
                                </svg>
                                Back to Welcome
                            </a>
                        </div>
                    </div>
                );
            };
            const root = ReactDOM.createRoot(document.getElementById("root"));
            root.render(<App />);
        </script>
    </body>
</html>
