<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WayFarer | Safety in Every Step</title>
        <!-- Fonts -->
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap"
            rel="stylesheet"
        />
        <script
            crossorigin
            src="https://unpkg.com/react@18/umd/react.production.min.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
        ></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            base: "#0b1121",
                            accent: "#22d3ee",
                            accentStrong: "#38bdf8",
                            border: "rgba(56,189,248,0.2)",
                        },
                        fontFamily: { sans: ["Inter", "sans-serif"] },
                        animation: {
                            "fade-up":
                                "fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards",
                        },
                        keyframes: {
                            fadeUp: {
                                "0%": {
                                    opacity: "0",
                                    transform: "translateY(30px)",
                                },
                                "100%": {
                                    opacity: "1",
                                    transform: "translateY(0)",
                                },
                            },
                        },
                    },
                },
            };
        </script>
    </head>
    <body
        class="h-screen flex items-center justify-center relative bg-[#0b1121] text-slate-100 overflow-hidden"
    >
        <!-- Vibrant Glowing Orbs -->
        <div
            class="absolute w-[60vw] h-[60vw] bg-[radial-gradient(circle,rgba(34,211,238,0.22)_0%,transparent_60%)] -top-[20%] -left-[20%] rounded-full pointer-events-none"
        ></div>
        <div
            class="absolute w-[50vw] h-[50vw] bg-[radial-gradient(circle,rgba(59,130,246,0.18)_0%,transparent_60%)] -bottom-[20%] -right-[10%] rounded-full pointer-events-none"
        ></div>
        <div
            class="absolute w-[40vw] h-[40vw] bg-[radial-gradient(circle,rgba(45,212,191,0.14)_0%,transparent_60%)] top-[10%] right-[10%] rounded-full pointer-events-none"
        ></div>

        <div
            id="root"
            class="z-10 text-center max-w-3xl p-8 opacity-0 animate-fade-up"
        ></div>

        <script type="text/babel">
            const { useEffect } = React;
            const App = () => {
                useEffect(() => {
                    const container = document.body;
                    for (let i = 0; i < 25; i++) {
                        const el = document.createElement("div");
                        el.className =
                            "absolute rounded-full pointer-events-none shadow-[0_0_15px_#38bdf8]";
                        el.style.backgroundColor = "#38bdf8";
                        const size = Math.random() * 5 + 2;
                        el.style.width = size + "px";
                        el.style.height = size + "px";
                        el.style.left = Math.random() * 100 + "vw";
                        el.style.top = Math.random() * 100 + "vh";
                        el.style.opacity = Math.random() * 0.6 + 0.2;
                        const duration = Math.random() * 15 + 10;
                        el.animate(
                            [
                                {
                                    transform: `translateY(0px) translateX(0px)`,
                                },
                                {
                                    transform: `translateY(-${Math.random() * 200 + 100}px) translateX(${Math.random() * 100 - 50}px)`,
                                },
                            ],
                            {
                                duration: duration * 1000,
                                iterations: Infinity,
                                direction: "alternate",
                                easing: "ease-in-out",
                            },
                        );
                        container.appendChild(el);
                    }
                }, []);

                return (
                    <div className="relative">
                        <div className="inline-block px-5 py-2 mb-8 rounded-full bg-gradient-to-r from-sky-500/20 to-blue-600/20 border border-sky-400/30 text-sky-300 text-sm font-bold tracking-widest uppercase shadow-[0_0_20px_rgba(14,165,233,0.2)]">
                            Next-Gen Personal Security
                        </div>
                        <h1 className="text-6xl md:text-7xl font-extrabold tracking-tight leading-tight mb-6 text-white drop-shadow-xl">
                            Safe wherever <br /> you{" "}
                            <span className="text-transparent bg-clip-text bg-gradient-to-br from-sky-400 to-blue-500 drop-shadow-[0_0_35px_rgba(56,189,248,0.8)]">
                                roam.
                            </span>
                        </h1>
                        <p className="text-xl text-blue-100/70 mb-12 max-w-2xl mx-auto leading-relaxed font-medium">
                            WayFarer connects you to a live community shield,
                            offering instant SOS alerts, dynamic danger mapping,
                            and ultimate peace of mind.
                        </p>
                        <a
                            href="login.html"
                            className="inline-flex items-center gap-3 bg-gradient-to-r from-sky-400 to-blue-500 text-white px-8 py-4 rounded-full text-lg font-bold hover:scale-105 transition-all duration-300 shadow-[0_0_40px_rgba(56,189,248,0.5)] border border-sky-300/50 hover:shadow-[0_0_50px_rgba(56,189,248,0.8)]"
                        >
                            Get Started
                            <svg
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                strokeWidth="2.5"
                                strokeLinecap="round"
                                strokeLinejoin="round"
                            >
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </a>
                    </div>
                );
            };
            const root = ReactDOM.createRoot(document.getElementById("root"));
            root.render(<App />);
        </script>
    </body>
</html>
