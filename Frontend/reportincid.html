<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayFarer SOS Alert</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #0D1B2A;
            --bg-card: #1E2D3E;
            --accent-teal: #00B4D8;
            --danger-red: #EF4444;
            --text-white: #FFFFFF;
            --text-muted: #94A3B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Viewport */
        .mobile-screen {
            width: 375px;
            height: 812px;
            background-color: var(--bg-deep);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 8px solid #1a1a1a;
            border-radius: 40px;
        }

        /* --- Header --- */
        .header {
            padding: 60px 20px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: var(--text-white);
            flex: 1;
            text-align: center;
        }

        .back-btn {
            color: var(--text-white);
            cursor: pointer;
        }

        /* --- SOS Main Section --- */
        .sos-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .sos-outer-ring {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Pulsing Glow Animation */
        .sos-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--danger-red);
            border-radius: 50%;
            opacity: 0.3;
            animation: pulse-out 2s infinite ease-out;
        }

        @keyframes pulse-out {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .sos-main-btn {
            position: relative;
            width: 200px;
            height: 200px;
            background: var(--danger-red);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(239, 68, 68, 0.4);
            border: 8px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            cursor: pointer;
        }

        .sos-main-btn span {
            font-size: 3rem;
            font-weight: 900;
            color: white;
            letter-spacing: -1px;
        }

        .status-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .cancel-link {
            color: var(--accent-teal);
            font-size: 0.85rem;
            text-decoration: none;
            font-weight: 600;
        }

        /* --- Quick Actions --- */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 20px 30px;
        }

        .action-btn {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .action-btn span {
            font-size: 0.65rem;
            color: var(--text-white);
            font-weight: 600;
            text-align: center;
        }

        /* --- Recent Alerts List --- */
        .recent-section {
            padding: 0 20px 100px;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        .alert-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .alert-info h4 {
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .alert-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .status-badge {
            font-size: 0.65rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-active { background: rgba(239, 68, 68, 0.1); color: var(--danger-red); }
        .badge-resolved { background: rgba(0, 180, 216, 0.1); color: var(--accent-teal); }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: var(--bg-deep);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 20px;
            z-index: 100;
        }

        .nav-item { color: var(--text-muted); cursor: pointer; }
        .nav-item.active { color: var(--accent-teal); }
    </style>
</head>
<body>

    <div class="mobile-screen">
        <!-- Header -->
        <header class="header">
            <a href="index.html" style="color: var(--text-white); text-decoration: none; display: flex; align-items: center;"><i data-lucide="chevron-left" class="back-btn"></i></a>
            <h1>Emergency Alert</h1>
            <div style="width: 24px;"></div> <!-- Spacer -->
        </header>

        <!-- SOS Trigger Area -->
        <div class="sos-container">
            <div class="sos-outer-ring">
                <div class="sos-pulse"></div>
                <div class="sos-main-btn">
                    <span>SOS</span>
                </div>
            </div>
            <p class="status-text">Hold to activate emergency alert</p>
            <a href="index.html" class="cancel-link">Cancel</a>
        </div>

        <!-- Quick Actions Row -->
        <div class="quick-actions">
            <div class="action-btn">
                <i data-lucide="map-pin" color="#00B4D8" size="20"></i>
                <span>Share Location</span>
            </div>
            <div class="action-btn">
                <i data-lucide="phone-forwarded" color="#00B4D8" size="20"></i>
                <span>Call Security</span>
            </div>
            <div class="action-btn">
                <i data-lucide="message-square" color="#00B4D8" size="20"></i>
                <span>Send Message</span>
            </div>
        </div>

        <!-- Recent Alerts -->
        <div class="recent-section">
            <span class="section-title">Recent Activity</span>
            
            <div class="alert-card">
                <div class="alert-info">
                    <h4>Industrial Zone 4</h4>
                    <p>Today, 12:40 PM • GPS Active</p>
                </div>
                <span class="status-badge badge-active">Active</span>
            </div>

            <div class="alert-card">
                <div class="alert-info">
                    <h4>South Campus Park</h4>
                    <p>Yesterday, 08:15 PM</p>
                </div>
                <span class="status-badge badge-resolved">Resolved</span>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item"><i data-lucide="map"></i></div>
            <div class="nav-item active"><i data-lucide="shield-alert"></i></div>
            <div class="nav-item"><i data-lucide="users"></i></div>
            <div class="nav-item"><i data-lucide="settings"></i></div>
        </nav>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
