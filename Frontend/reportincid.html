<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WayFarer | Report Incident</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{font-family:Inter,sans-serif;background:#0b1121;color:#e2e8f0;}</style>

<style>
button {
  transition: all 0.25s ease;
}
button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px rgba(56,189,248,0.6),
              0 0 20px rgba(59,130,246,0.5),
              0 0 30px rgba(99,102,241,0.4);
}
</style>

</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-xl bg-slate-800/70 border border-sky-500/20 rounded-3xl p-8 shadow-2xl">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-black text-white">Report Incident</h1>
      <a href="index.html" class="text-sky-300 text-sm">Back</a>
    </div>
    <form id="incidentForm" class="space-y-5">
      <div>
        <label class="block mb-2 text-sm text-slate-300">Zone</label>
        <input id="zone" class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-3" placeholder="Low Lighting Corridor" required />
      </div>
      <div>
        <label class="block mb-2 text-sm text-slate-300">Issue Type</label>
        <select id="type" class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-3">
          <option>Poor Lighting</option>
          <option>Suspicious Activity</option>
          <option>Harassment</option>
          <option>Medical Emergency</option>
        </select>
      </div>
      <div>
        <label class="block mb-2 text-sm text-slate-300">Severity</label>
        <select id="severity" class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-3">
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>
      </div>
      <div>
        <label class="block mb-2 text-sm text-slate-300">Description</label>
        <textarea id="description" class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-3 h-28" placeholder="Describe what happened"></textarea>
      </div>
      <button class="w-full bg-gradient-to-r from-sky-400 to-blue-600 text-white py-4 rounded-xl font-black">Submit Report</button>
    </form>
    <p id="status" class="mt-4 text-sm text-emerald-400 hidden">Incident saved to localStorage.</p>
  </div>
  <script>
    document.getElementById('incidentForm').addEventListener('submit', function(e){
      e.preventDefault();
      const incident = {
        zone: document.getElementById('zone').value,
        type: document.getElementById('type').value,
        severity: document.getElementById('severity').value,
        description: document.getElementById('description').value,
        time: new Date().toISOString()
      };
      const existing = JSON.parse(localStorage.getItem('wayfarer_incidents') || '[]');
      existing.unshift(incident);
      localStorage.setItem('wayfarer_incidents', JSON.stringify(existing));
      document.getElementById('status').classList.remove('hidden');
      this.reset();
    });
  </script>
</body>
</html>
