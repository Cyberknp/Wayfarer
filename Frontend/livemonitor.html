<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WayFarer | Live AI Camera Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter","sans-serif"] } } } };
  </script>
  <style>
    body {
      background:#0b1121;
      color:#e2e8f0;
      background-image:
        radial-gradient(circle at 15% 40%, rgba(34,211,238,0.12) 0%, transparent 55%),
        radial-gradient(circle at 85% 20%, rgba(59,130,246,0.12) 0%, transparent 50%);
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [detectionStatus, setDetectionStatus] = useState("ANALYZING"); // ANALYZING, SAFE, DANGER
  const [logs, setLogs] = useState([]);

  useEffect(() => {
    // Mock simulation of AI detection
    const statuses = ["SAFE", "SAFE", "SAFE", "DANGER", "SAFE"];
    let i = 0;
    
    const interval = setInterval(() => {
        i = (i + 1) % statuses.length;
        setDetectionStatus(statuses[i]);
        
        const timestamp = new Date().toLocaleTimeString();
        if (statuses[i] === "DANGER") {
            setLogs(prev => [{ time: timestamp, msg: "Suspicious activity detected! High movement speed.", type: "danger" }, ...prev].slice(0, 10));
        } else {
            setLogs(prev => [{ time: timestamp, msg: "Scene clear. Tracking standard movement.", type: "info" }, ...prev].slice(0, 10));
        }
    }, 4500);

    return () => clearInterval(interval);
  }, []);

  return (
    <div className="pb-16 min-h-screen">
      <nav className="fixed top-0 left-0 right-0 px-6 py-4 flex flex-col md:flex-row justify-between items-center bg-[#0B1121]/80 backdrop-blur-2xl border-b border-sky-500/20 z-50">
        <div className="text-2xl font-black tracking-tight flex items-center gap-3 mb-4 md:mb-0 text-white cursor-pointer" onClick={() => window.location.href = "index.html"}>
          <span>Way<span className="text-transparent bg-clip-text bg-gradient-to-br from-sky-400 to-blue-500">Farer</span></span>
        </div>
        <div className="flex flex-wrap items-center justify-center gap-4">
          <button className="px-5 py-2.5 bg-red-500/10 text-red-400 border border-red-500/30 rounded-xl" onClick={() => window.location.href = "reportincid.html"}>Report</button>
          <button className="px-5 py-2.5 bg-sky-500/20 text-sky-300 border border-sky-400/30 rounded-xl" onClick={() => window.location.href = "dangermap.html"}>Danger Map</button>
          <button className="px-5 py-2.5 bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 rounded-xl" onClick={() => window.location.href = "livemonitor.html"}>Live Monitor</button>
          <button className="px-5 py-2.5 bg-amber-500/10 text-amber-500 border border-amber-500/30 rounded-xl" onClick={() => window.location.href = "securitydash.html"}>Security Center</button>
          <button className="px-5 py-2.5 bg-violet-500/10 text-violet-400 border border-violet-500/30 rounded-xl" onClick={() => window.location.href = "profile.html"}>Profile</button>
        </div>
      </nav>

      <main className="max-w-[1400px] mx-auto pt-36 px-6">
        <header className="mb-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
          <div>
            <div className="inline-flex items-center gap-2 px-4 py-1.5 bg-emerald-500/10 text-emerald-400 text-sm font-black uppercase tracking-widest rounded-full border border-emerald-500/30 mb-6">
              Neural Vision Active
            </div>
            <h1 className="text-4xl md:text-5xl font-black mb-4 text-white tracking-tighter leading-tight">Live AI Surveillance</h1>
            <p className="text-lg text-sky-200 font-semibold max-w-xl">Real-time object detection and behavioral analysis using deep learning models to identify anomalies instantly.</p>
          </div>
          <div className="bg-slate-800/60 p-5 rounded-2xl border border-sky-500/20 backdrop-blur-xl flex items-center gap-6">
             <div>
                <div className="text-xs text-zinc-400 uppercase font-black mb-1">Active Model</div>
                <div className="text-white font-bold leading-none">YOLOv8-Security</div>
             </div>
             <div className="w-px h-10 bg-white/10"></div>
             <div>
                <div className="text-xs text-zinc-400 uppercase font-black mb-1">Inference Time</div>
                <div className="text-emerald-400 font-bold leading-none flex items-center gap-1">
                  12ms 
                  <span className="flex h-2 w-2 relative">
                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                  </span>
                </div>
             </div>
          </div>
        </header>

        <div className="grid grid-cols-1 lg:grid-cols-[1fr_400px] gap-8">
          
          {/* Camera Feed Column */}
          <div className="bg-slate-800/80 backdrop-blur-2xl border border-sky-500/20 rounded-[32px] p-4 lg:p-8 shadow-2xl flex flex-col">
            <div className="flex justify-between items-center mb-6">
              <h3 className="text-2xl font-black text-white flex items-center gap-3">
                <svg className="w-6 h-6 text-sky-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
                Cam-04: Main Gate
              </h3>
              <div className="flex gap-2">
                 <span className="bg-red-500/20 text-red-400 text-xs font-bold px-3 py-1 rounded-full border border-red-500/30 flex items-center gap-2">
                   <div className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div> LIVE
                 </span>
                 <span className="bg-white/10 text-white text-xs font-bold px-3 py-1 rounded-full">1080p 60FPS</span>
              </div>
            </div>
            
            <div className="w-full aspect-video bg-black rounded-2xl relative overflow-hidden ring-4 ring-black shadow-inner flex items-center justify-center group">
              {/* Mock Camera Feed Background */}
              <div className="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1541888086053-ec52b821430c?q=80&w=1600&auto=format&fit=crop')] bg-cover bg-center filter grayscale contrast-125 brightness-75"></div>
              
              {/* Scanning Overlay Animation */}
              <div className="absolute inset-0 border-2 border-emerald-500/20 mix-blend-overlay">
                 <div className="w-full h-1 bg-emerald-500/50 shadow-[0_0_15px_rgba(16,185,129,0.8)] absolute top-0 left-0 animate-[scan_3s_ease-in-out_infinite_alternate]"></div>
              </div>
              
              {/* AI Bounding Boxes Mockup */}
              {detectionStatus === "DANGER" && (
                <div className="absolute top-[30%] left-[40%] w-[15%] h-[40%] border-2 border-red-500 bg-red-500/10 flex justify-center">
                  <span className="bg-red-500 text-white text-[10px] font-bold px-1 absolute -top-4 left-0 whitespace-nowrap">SUSPECT (98%)</span>
                </div>
              )}
              {detectionStatus === "SAFE" && (
                <div className="absolute top-[40%] left-[60%] w-[10%] h-[30%] border-2 border-emerald-500 bg-emerald-500/10 flex justify-center">
                  <span className="bg-emerald-500 text-white text-[10px] font-bold px-1 absolute -top-4 left-0 whitespace-nowrap">PERSON (91%)</span>
                </div>
              )}

              {/* Crosshairs & UI Overlays */}
              <div className="absolute top-4 left-4 text-xs font-mono text-emerald-400 font-bold drop-shadow">
                SYS.TRACKING_INIT // [OK]<br/>
                DL.CONFIDENCE &gt; 90%
              </div>
              <div className="absolute bottom-4 left-4 text-xs font-mono text-white/50 drop-shadow">
                 LAT: 13.25472 | LNG: 74.78558<br/>
                 SMVITM PERIMETER
              </div>
              <div className="absolute inset-0 pointer-events-none" style={{
                background: "linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06))",
                backgroundSize: "100% 4px, 6px 100%"
              }}></div>
            </div>
            
            <style>{`
              @keyframes scan {
                0% { top: 0%; }
                100% { top: 100%; }
              }
            `}</style>
          </div>

          {/* AI Analysis Column */}
          <div className="flex flex-col gap-6">
            <div className={`backdrop-blur-2xl border rounded-[32px] p-8 shadow-2xl text-center transition-colors duration-500 ${
              detectionStatus === 'DANGER' ? 'bg-red-500/10 border-red-500/40 shadow-[0_0_40px_rgba(239,68,68,0.2)]' : 
              detectionStatus === 'SAFE' ? 'bg-emerald-500/10 border-emerald-500/40 shadow-[0_0_40px_rgba(16,185,129,0.1)]' : 
              'bg-slate-800/60 border-sky-500/20'
            }`}>
              <h3 className="text-xl font-black mb-6 text-white uppercase tracking-widest">Global Status</h3>
              
              <div className="flex justify-center mb-6">
                {detectionStatus === 'DANGER' ? (
                   <div className="w-32 h-32 rounded-full border-4 border-red-500 border-dashed animate-[spin_3s_linear_infinite] flex items-center justify-center bg-red-500/20">
                     <svg className="w-16 h-16 text-red-500 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                       <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                     </svg>
                   </div>
                ) : (
                   <div className="w-32 h-32 rounded-full border-4 border-emerald-500 border-dashed animate-[spin_8s_linear_infinite] flex items-center justify-center bg-emerald-500/10">
                     <svg className="w-16 h-16 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                       <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                     </svg>
                   </div>
                )}
              </div>
              
              {detectionStatus === 'DANGER' ? (
                <div>
                  <h2 className="text-3xl font-black text-red-500 mb-2">THREAT DETECTED</h2>
                  <p className="text-red-300 text-sm font-semibold">Immediate attention recommended.</p>
                  <button className="mt-6 w-full py-3 bg-red-600 hover:bg-red-500 text-white font-black rounded-xl transition-all shadow-[0_0_20px_rgba(220,38,38,0.5)]">
                    INITIATE LOCKDOWN PROTOCOL
                  </button>
                </div>
              ) : (
                <div>
                  <h2 className="text-3xl font-black text-emerald-500 mb-2">ALL CLEAR</h2>
                  <p className="text-emerald-300 text-sm font-semibold">No anomalous behavior detected.</p>
                </div>
              )}
            </div>

            <div className="bg-slate-800/60 backdrop-blur-2xl border border-sky-500/20 rounded-[32px] p-6 shadow-2xl flex-1 flex flex-col">
              <h3 className="text-sm font-black text-zinc-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                </svg>
                Inference Log
              </h3>
              
              <div className="flex-1 overflow-y-auto max-h-[300px] space-y-3 font-mono text-xs pr-2">
                 {logs.map((log, idx) => (
                   <div key={idx} className={`p-3 rounded-lg border ${log.type === 'danger' ? 'bg-red-500/10 border-red-500/20 text-red-300' : 'bg-white/5 border-white/5 text-slate-300'}`}>
                     <span className="opacity-50 mr-2">[{log.time}]</span>
                     {log.msg}
                   </div>
                 ))}
                 {logs.length === 0 && <div className="text-center text-zinc-500 italic mt-10">Awaiting inference data...</div>}
              </div>
            </div>
          </div>
          
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
