<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayFarer | Profile</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --bg-base: #050a14;
            --bg-surface: rgba(15, 30, 50, 0.4);
            --bg-surface-hover: rgba(15, 30, 50, 0.8);
            --accent-main: #00d4ff;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger-main: #ff3b3b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 90%, rgba(0, 212, 255, 0.08) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .back-btn:hover { background: rgba(255,255,255,0.1); }

        .glass-panel {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 2rem;
            margin-bottom: 2rem;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-main), #0044ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            border: 4px solid var(--bg-surface);
            flex-shrink: 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            text-align: center;
        }

        .stat-card {
            background: rgba(0,0,0,0.2);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.05);
        }

        .stat-card h2 {
            font-size: 2.5rem;
            color: var(--accent-main);
            margin-bottom: 0.2rem;
        }

        .danger-btn {
            background: rgba(255, 59, 59, 0.1);
            color: var(--danger-main);
            border: 1px solid var(--danger-main);
            padding: 1rem 2rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
            margin-top: 2rem;
            width: 100%;
        }

        .danger-btn:hover {
            background: var(--danger-main);
            color: white;
            box-shadow: 0 0 20px rgba(255, 59, 59, 0.4);
        }

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="container">
                    <div className="header">
                        <a href="index.html" className="back-btn">← Back to Dashboard</a>
                        <h2>User Profile</h2>
                    </div>

                    <div className="glass-panel">
                        <div className="profile-header">
                            <div className="avatar">JD</div>
                            <div>
                                <h1 style={{fontSize: '2rem', marginBottom: '0.2rem'}}>John Doe</h1>
                                <p style={{color: 'var(--text-secondary)'}}>Community Member since 2026</p>
                                <span style={{display: 'inline-block', marginTop: '0.8rem', background: 'rgba(0, 212, 255, 0.1)', color: 'var(--accent-main)', padding: '0.3rem 1rem', borderRadius: '20px', fontSize: '0.85rem'}}>
                                    Verified Explorer
                                </span>
                            </div>
                        </div>

                        <div className="stats-grid">
                            <div className="stat-card">
                                <h2>98</h2>
                                <p style={{color: 'var(--text-secondary)', fontSize: '0.9rem'}}>Trust Score</p>
                            </div>
                            <div className="stat-card">
                                <h2>14</h2>
                                <p style={{color: 'var(--text-secondary)', fontSize: '0.9rem'}}>Reports Verified</p>
                            </div>
                            <div className="stat-card">
                                <h2>3</h2>
                                <p style={{color: 'var(--text-secondary)', fontSize: '0.9rem'}}>Active Patrols</p>
                            </div>
                        </div>

                        <button className="danger-btn" onClick={() => window.location.href = 'welcome.html'}>
                            Log Out
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
