<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WayFarer | SMVITM Campus Safety</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter","sans-serif"] } } } };
  </script>
  <style>
    body {
      background:#0b1121;
      color:#e2e8f0;
      background-image:
        radial-gradient(circle at 15% 40%, rgba(34,211,238,0.12) 0%, transparent 55%),
        radial-gradient(circle at 85% 20%, rgba(59,130,246,0.12) 0%, transparent 50%);
    }
    #map { height: 520px; width: 100%; z-index: 1; }
    .leaflet-container { background: #0c162d; }
    @keyframes slide-in { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
    .animate-slide-in { animation: slide-in .3s ease forwards; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="ai.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const ORS_API_KEY = "PASTE_YOUR_ORS_KEY_HERE";
const CAMPUS_CENTER = [13.25472, 74.78558];
const campusLocations = [
  { id: 1, name: "Main Gate", lat: 13.25472, lng: 74.78558, type: "gate" },
  { id: 2, name: "Academic Block", lat: 13.25505, lng: 74.78595, type: "academic" },
  { id: 3, name: "Library Block", lat: 13.25496, lng: 74.78541, type: "academic" },
  { id: 4, name: "Security Office", lat: 13.25458, lng: 74.78582, type: "security" },
  { id: 5, name: "Clinic / First Aid", lat: 13.25442, lng: 74.78528, type: "medical" },
  { id: 6, name: "Boys Hostel Side", lat: 13.25532, lng: 74.78622, type: "hostel" },
  { id: 7, name: "Girls Hostel Side", lat: 13.25408, lng: 74.78598, type: "hostel" }
];
const riskZones = [
  { id: 1, name: "Low Lighting Corridor", lat: 13.25418, lng: 74.78516, level: "red", note: "Low lighting after 8 PM" },
  { id: 2, name: "Isolated Walkway", lat: 13.25526, lng: 74.78602, level: "orange", note: "Sparse footfall in late evening" },
  { id: 3, name: "Security Corridor", lat: 13.25463, lng: 74.78578, level: "green", note: "Patrol-heavy and well lit" },
  { id: 4, name: "Parking Side Stretch", lat: 13.25492, lng: 74.78628, level: "orange", note: "Moderate lighting, limited footfall" },
  { id: 5, name: "Main Gate Safe Belt", lat: 13.25470, lng: 74.78564, level: "green", note: "High visibility and frequent patrol" }
];

function App() {
  const [toasts, setToasts] = useState([]);
  const [mapStyle, setMapStyle] = useState("imagery");
  const mapRef = useRef(null);
  const routeLayerRef = useRef(null);
  const baseLayerRef = useRef(null);
  const labelLayerRef = useRef(null);

  const addToast = (msg, type = "info") => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 2600);
  };

  const getNearestSecurity = () => campusLocations.find(l => l.type === "security");

  const switchBasemap = (style) => {
    setMapStyle(style);
    if (!mapRef.current) return;
    if (baseLayerRef.current) mapRef.current.removeLayer(baseLayerRef.current);
    if (labelLayerRef.current) mapRef.current.removeLayer(labelLayerRef.current);

    if (style === "imagery") {
      baseLayerRef.current = L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        { attribution: "Tiles © Esri" }
      ).addTo(mapRef.current);
      labelLayerRef.current = L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png",
        { subdomains: "abcd", attribution: "© OpenStreetMap contributors © CARTO", opacity: 0.9 }
      ).addTo(mapRef.current);
    } else {
      baseLayerRef.current = L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        { attribution: "© OpenStreetMap contributors" }
      ).addTo(mapRef.current);
    }
  };

  const drawRoute = async (start, end, color = "#38bdf8") => {
    try {
      if (!ORS_API_KEY || ORS_API_KEY === "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImVjODhhZGUwZWQ1ZjQzODQ4M2ZiZTVlYTZhOWM1ZWFjIiwiaCI6Im11cm11cjY0In0=") {
        addToast("API key missing or not loaded.", "warning");
        return;
      }
      const res = await fetch("https://corsproxy.io/?https://api.openrouteservice.org/v2/directions/foot-walking/geojson", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: ORS_API_KEY.trim() },
        body: JSON.stringify({ coordinates: [[start.lng, start.lat], [end.lng, end.lat]] })
      });
      if (!res.ok) {
        const txt = await res.text();
        console.error(txt);
        throw new Error("Route request failed");
      }
      const data = await res.json();
      if (routeLayerRef.current) mapRef.current.removeLayer(routeLayerRef.current);
      const coords = data.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
      routeLayerRef.current = L.polyline(coords, { color, weight: 5 }).addTo(mapRef.current);
      const summary = data.features[0].properties.summary;
      addToast(`Route loaded: ${summary.distance.toFixed(0)} m • ${Math.ceil(summary.duration / 60)} min`, "info");
    } catch (err) {
      console.error(err);
      addToast("Route failed. Recheck ORS key in this file.", "danger");
    }
  };

  useEffect(() => {
  const map = L.map("map").setView(CAMPUS_CENTER, 19);
  mapRef.current = map;

  switchBasemap("imagery");

  campusLocations.forEach(loc => {
    L.marker([loc.lat, loc.lng])
      .addTo(map)
      .bindPopup(`<b>${loc.name}</b><br/>${loc.type}`);
  });

  const styles = {
    red: { color: "#ef4444", radius: 35, label: "High Risk 🔴" },
    orange: { color: "#f59e0b", radius: 28, label: "Medium Risk 🟠" },
    green: { color: "#22c55e", radius: 24, label: "Safe Zone 🟢" }
  };

 riskZones.forEach(zone => {
  const aiRisk = getRiskLevel(zone);

  let color = "#22c55e";
  let label = "Safe Zone 🟢";

  if (aiRisk === "HIGH") {
    color = "#ef4444";
    label = "High Risk 🔴";
  } else if (aiRisk === "MEDIUM") {
    color = "#f59e0b";
    label = "Medium Risk 🟠";
  }

  L.circle([zone.lat, zone.lng], {
    radius: 32,
    color: color,
    fillColor: color,
    fillOpacity: 0.4,
    weight: 2
  })
  .addTo(map)
  .bindPopup(`
    <b>${zone.name}</b><br/>
    AI Risk: <b>${aiRisk}</b><br/>
    ${zone.note}<br/>
    <small>AI based on time, activity & pattern analysis</small>
  `);
});

  const legend = L.control({ position: "bottomleft" });

  legend.onAdd = function () {
    const div = L.DomUtil.create("div", "info legend");
    div.innerHTML = `
      <div style="background:#111;padding:10px;border-radius:10px;color:white;font-size:12px">
        <b>Risk Levels</b><br/>
        🔴 High Risk<br/>
        🟠 Medium Risk<br/>
        🟢 Safe Zone
      </div>
    `;
    return div;
  };

  legend.addTo(map);

}, []);


  useEffect(() => {
    if (mapRef.current) switchBasemap(mapStyle);
  }, [mapStyle]);

  const handleQuickRoute = () => drawRoute(campusLocations[0], campusLocations[2]);
  const emergencyNumbers = [
  { name: "My Number", number: "+917204643772" },
  { name: "Campus Security", number: "+911234567890" },
  { name: "Police", number: "100" }
];

const handleSOS = () => {
  addToast("AI analyzing emergency...", "info");

  setTimeout(() => {
    addToast("AI suggests immediate contact 🚨", "danger");

    const options = emergencyNumbers
      .map((c, i) => `${i + 1}. ${c.name} (${c.number})`)
      .join("\\n");

    const choice = prompt(`AI Recommended Actions:\\n\\n${options}`);

    const selected = emergencyNumbers[parseInt(choice) - 1];

    if (selected) {
      window.location.href = `tel:${selected.number}`;
    }
  }, 1000);
};

  return (
    <div className="pb-16 min-h-screen">
      <nav className="fixed top-0 left-0 right-0 px-6 py-4 flex flex-col md:flex-row justify-between items-center bg-[#0B1121]/80 backdrop-blur-2xl border-b border-sky-500/20 z-50">
        <div className="text-2xl font-black tracking-tight flex items-center gap-3 mb-4 md:mb-0 text-white">
          <span>Way<span className="text-transparent bg-clip-text bg-gradient-to-br from-sky-400 to-blue-500">Farer</span></span>
        </div>
        <div className="flex flex-wrap items-center justify-center gap-4">
          <button className="px-5 py-2.5 bg-red-500/10 text-red-400 border border-red-500/30 rounded-xl" onClick={() => window.location.href = "reportincid.html"}>Report</button>
          <button className="px-5 py-2.5 bg-sky-500/20 text-sky-300 border border-sky-400/30 rounded-xl" onClick={() => window.location.href = "dangermap.html"}>Danger Map</button>
          <button className="px-5 py-2.5 bg-amber-500/10 text-amber-500 border border-amber-500/30 rounded-xl" onClick={() => window.location.href = "securitydash.html"}>Security Center</button>
          <button className="px-5 py-2.5 bg-violet-500/10 text-violet-400 border border-violet-500/30 rounded-xl" onClick={() => window.location.href = "profile.html"}>Profile</button>
          <button className="px-5 py-2.5 bg-slate-500/20 text-slate-300 border border-slate-400/30 rounded-xl" onClick={() => window.location.href = "welcome.html"}>Logout</button>
        </div>
      </nav>

      <main className="max-w-[1280px] mx-auto pt-36 px-6">
        <header className="mb-10">
          <div className="inline-flex items-center gap-2 px-4 py-1.5 bg-emerald-500/10 text-emerald-400 text-sm font-black uppercase tracking-widest rounded-full border border-emerald-500/30 mb-6">
            SMVITM Prototype Active
          </div>
          <h1 className="text-5xl md:text-6xl font-black mb-4 text-white tracking-tighter leading-tight">Campus safety intelligence for SMVITM.</h1>
          <p className="text-xl text-sky-200 font-semibold">Satellite-ish view, clearer labels, and risk zones that actually show up without squinting.</p>
        </header>

        <div className="grid grid-cols-1 lg:grid-cols-[1fr_400px] gap-10">
          <div className="bg-slate-800/60 backdrop-blur-2xl border border-sky-500/20 rounded-[32px] p-8 shadow-2xl">
            <div className="flex justify-between items-center gap-4 flex-wrap mb-5">
              <h3 className="text-2xl font-black text-white">Campus Risk Map</h3>
              <div className="flex gap-3">
                <button onClick={() => setMapStyle("imagery")} className="text-xs font-black px-3 py-2 bg-sky-500/20 text-sky-300 rounded-lg border border-sky-400/30 uppercase">Satellite View</button>
                <button onClick={() => setMapStyle("osm")} className="text-xs font-black px-3 py-2 bg-white/5 text-slate-200 rounded-lg border border-white/10 uppercase">Normal View</button>
                <button onClick={handleQuickRoute} className="text-xs font-black px-3 py-2 bg-emerald-500/20 text-emerald-300 rounded-lg border border-emerald-400/30 uppercase">Route Demo</button>
              </div>
            </div>
            <div className="rounded-2xl overflow-hidden border border-sky-500/20"><div id="map"></div></div>
          </div>

          <div className="flex flex-col gap-8">
            <div className="bg-slate-800/60 backdrop-blur-2xl border border-red-500/20 rounded-[32px] p-8 shadow-2xl text-center">
              <h3 className="text-2xl font-black mb-3 text-white">Emergency Relay</h3>
              <p className="text-sm text-red-200/70 font-semibold uppercase tracking-wider mb-8">Route to nearest security office.</p>
              <button onClick={handleSOS} className="w-40 h-40 rounded-full bg-gradient-to-br from-red-500 to-rose-700 text-white text-5xl font-black shadow-[0_0_50px_rgba(239,68,68,0.6)]">SOS</button>
            </div>

            <div className="bg-slate-800/60 backdrop-blur-2xl border border-sky-500/20 rounded-[32px] p-6 shadow-2xl">
              <h3 className="text-xl font-black text-white mb-4">Zone Legend</h3>
              <div className="space-y-3 text-sm">
                <div className="p-3 rounded-xl bg-red-500/15 border border-red-500/30"><div className="font-bold text-white">Red Zone</div><div className="text-slate-300">Low lighting area at night, blind spots, recent complaints</div></div>
                <div className="p-3 rounded-xl bg-amber-500/15 border border-amber-500/30"><div className="font-bold text-white">Orange Zone</div><div className="text-slate-300">Moderate caution, lower crowd density after evening</div></div>
                <div className="p-3 rounded-xl bg-emerald-500/15 border border-emerald-500/30"><div className="font-bold text-white">Green Zone</div><div className="text-slate-300">Safe corridor, patrol-backed and better visibility</div></div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <div className="fixed top-24 right-5 z-[9999] space-y-3 w-[310px]">
        {toasts.map((toast) => (
          <div key={toast.id} className={`animate-slide-in rounded-xl px-4 py-3 border text-sm font-semibold shadow-xl ${
            toast.type === "danger" ? "bg-red-500/20 border-red-500/40 text-red-100" :
            toast.type === "warning" ? "bg-amber-500/20 border-amber-500/40 text-amber-100" :
            "bg-slate-900/90 border-sky-500/30 text-sky-100"
          }`}>{toast.msg}</div>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
